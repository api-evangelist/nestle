aid: nestle
name: Nestlé
description: >-
  Nestlé S.A. is the world's largest food and beverage company by revenue,
  headquartered in Vevey, Switzerland. Its product portfolio spans coffee
  (Nescafé, Nespresso), water, pet food (Purina), baby and infant nutrition
  (Gerber, Cerelac), confectionery (KitKat), dairy, and health science. No
  public developer portal or external API offering has been identified for
  Nestlé; integrations with retailers and partners are handled through
  private B2B systems rather than a self-serve developer program.
